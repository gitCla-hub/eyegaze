<!DOCTYPE html>
<html>
<body>

<input id="word">
<button onclick="sendWord()">Send</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
  getDatabase,
  ref,
  set
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDWOGeCO1f0WXVkxxB6oj_oeQ3rMT6dlkg",
    authDomain: "eyegaze-77e86.firebaseapp.com",
    databaseURL: "https://eyegaze-77e86-default-rtdb.firebaseio.com",
    projectId: "eyegaze-77e86",
    storageBucket: "eyegaze-77e86.firebasestorage.app",
    messagingSenderId: "643702224610",
    appId: "1:643702224610:web:9655801fff4e62cb4150bb",
    measurementId: "G-DY4H2SPGKC"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.sendWord = function() {

  const word = document.getElementById("word").value;

  set(ref(db, 'word'), {
    text: word
  });
}

</script>

</body>
</html>
